name: Feature request
description: Suggest a new pattern or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: pattern
    attributes:
      label: Pattern
      description: What human-first design problem should this solve?
    validations:
      required: true
  - type: textarea
    id: generic
    attributes:
      label: Generic alternative
      description: What generic AI pattern should this avoid?
    validations:
      required: true
